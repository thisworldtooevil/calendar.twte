<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TWTE — 2026 Content Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --bg2: #111111;
  --bg3: #181818;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #e8e6e0;
  --text2: #888480;
  --text3: #555250;
  --accent: #c8ff00;
  --accent2: #ff6b35;
  --mono: 'IBM Plex Mono', monospace;
  --serif: 'DM Serif Display', serif;
  --red: #ff4444;
  --amber: #f59e0b;
  --gray: #555;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 14px; }
body { min-height: 100vh; }

/* HEADER */
.header {
  border-bottom: 1px solid var(--border);
  padding: 20px 28px 16px;
  display: flex;
  align-items: baseline;
  gap: 20px;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 100;
}
.logo {
  font-family: var(--serif);
  font-size: 22px;
  color: var(--text);
  letter-spacing: -0.02em;
  flex-shrink: 0;
}
.logo span { color: var(--accent); font-style: italic; }
.year-tag {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: .14em;
  padding-top: 2px;
}

/* LAYOUT */
.layout { display: flex; min-height: calc(100vh - 62px); }
.sidebar {
  width: 220px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  padding: 20px 0;
  position: sticky;
  top: 62px;
  height: calc(100vh - 62px);
  overflow-y: auto;
}
.main { flex: 1; min-width: 0; padding: 20px 28px 60px; }

/* SIDEBAR */
.s-section { padding: 0 16px 20px; }
.s-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: .16em;
  color: var(--text3);
  margin-bottom: 8px;
  display: block;
}
.s-btn {
  display: block;
  width: 100%;
  text-align: left;
  padding: 6px 10px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text2);
  background: none;
  border: none;
  cursor: pointer;
  border-radius: 4px;
  transition: all .12s;
  margin-bottom: 1px;
}
.s-btn:hover { background: var(--bg3); color: var(--text); }
.s-btn.on { background: var(--bg3); color: var(--accent); }
.s-divider { height: 1px; background: var(--border); margin: 4px 16px 16px; }
.view-tab {
  display: flex;
  align-items: center;
  gap: 8px;
}
.view-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--text3);
  flex-shrink: 0;
  transition: background .12s;
}
.s-btn.on .view-dot { background: var(--accent); }

/* FILTER ROW */
.filter-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.fp {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .06em;
  padding: 4px 10px;
  border-radius: 3px;
  border: 1px solid var(--border2);
  background: none;
  color: var(--text3);
  cursor: pointer;
  transition: all .12s;
}
.fp:hover { border-color: var(--text2); color: var(--text2); }
.fp.on { background: var(--bg3); border-color: var(--text2); color: var(--text); }
.fp.on.f-augi { border-color: #4ade80; color: #4ade80; }
.fp.on.f-twte { border-color: #f472b6; color: #f472b6; }
.fp.on.f-high { border-color: var(--red); color: var(--red); }
.fp.on.f-med { border-color: var(--amber); color: var(--amber); }

/* RESULTS COUNT */
.results-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.results-count { font-size: 11px; color: var(--text3); }
.results-count b { color: var(--text2); font-weight: 500; }

/* SPANNING */
.span-block {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 14px;
  margin-bottom: 14px;
}
.span-title { font-size: 9px; font-weight: 600; letter-spacing: .14em; color: var(--text3); margin-bottom: 8px; }
.span-pills { display: flex; flex-wrap: wrap; gap: 5px; }
.sp {
  font-size: 10px;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 3px;
  border: 1px solid;
}

/* WEEK VIEW HEADER */
.week-header {
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.week-header b { color: var(--accent); font-weight: 500; }

/* EVENT CARDS */
.ev-list { display: flex; flex-direction: column; gap: 2px; }
.ev-card {
  border: 1px solid transparent;
  border-radius: 6px;
  transition: border-color .12s, background .12s;
  overflow: hidden;
}
.ev-card:hover { border-color: var(--border2); background: var(--bg2); }
.ev-card.expanded { border-color: var(--border2); background: var(--bg2); }
.ev-main {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 9px 12px;
  cursor: pointer;
}
.pr-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 5px;
}
.pr-h { background: var(--red); }
.pr-m { background: var(--amber); }
.pr-l { background: var(--gray); }
.ev-date {
  min-width: 76px;
  font-size: 11px;
  color: var(--text3);
  flex-shrink: 0;
  padding-top: 1px;
}
.ev-body { flex: 1; min-width: 0; }
.ev-name { font-size: 13px; color: var(--text); line-height: 1.35; }
.ev-note { font-size: 11px; color: var(--text3); margin-top: 2px; line-height: 1.4; }
.ev-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
.tag {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: .08em;
  padding: 2px 7px;
  border-radius: 2px;
  border: 1px solid;
}
.tag-hol { border-color: #534AB7; color: #AFA9EC; }
.tag-cul { border-color: #0F6E56; color: #5DCAA5; }
.tag-pop { border-color: #854F0B; color: #EF9F27; }
.tag-spo { border-color: #185FA5; color: #85B7EB; }
.tag-mkt { border-color: #993C1D; color: #F0997B; }
.tag-augi { border-color: #3B6D11; color: #97C459; }
.tag-twte { border-color: #993556; color: #ED93B1; }
.ev-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.copy-btn {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: .1em;
  padding: 3px 8px;
  border-radius: 3px;
  border: 1px solid var(--border2);
  background: none;
  color: var(--text3);
  cursor: pointer;
  transition: all .12s;
  white-space: nowrap;
}
.copy-btn:hover { border-color: var(--accent); color: var(--accent); }
.copy-btn.copied { border-color: #4ade80; color: #4ade80; }
.expand-icon { font-size: 10px; color: var(--text3); flex-shrink: 0; transition: transform .15s; }
.ev-card.expanded .expand-icon { transform: rotate(180deg); }

/* EXPANDED PANEL */
.ev-expand {
  display: none;
  padding: 0 12px 12px 95px;
}
.ev-card.expanded .ev-expand { display: block; }
.notes-label { font-size: 9px; font-weight: 600; letter-spacing: .12em; color: var(--text3); margin-bottom: 6px; }
.notes-area {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px 10px;
  resize: vertical;
  min-height: 64px;
  line-height: 1.5;
  transition: border-color .12s;
  outline: none;
}
.notes-area:focus { border-color: var(--accent); }
.notes-area::placeholder { color: var(--text3); }
.notes-saved {
  font-size: 9px;
  color: #4ade80;
  margin-top: 4px;
  height: 14px;
  transition: opacity .3s;
}

/* BRIEF MODAL */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  width: 100%;
  max-width: 560px;
  padding: 24px;
  position: relative;
}
.modal-title { font-family: var(--serif); font-size: 18px; margin-bottom: 4px; }
.modal-sub { font-size: 11px; color: var(--text3); margin-bottom: 18px; }
.brief-box {
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 14px;
  font-size: 12px;
  line-height: 1.7;
  color: var(--text2);
  white-space: pre-wrap;
  font-family: var(--mono);
  margin-bottom: 16px;
  max-height: 300px;
  overflow-y: auto;
}
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
.btn-primary {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .1em;
  padding: 8px 18px;
  border-radius: 4px;
  border: none;
  background: var(--accent);
  color: #000;
  cursor: pointer;
  transition: opacity .12s;
}
.btn-primary:hover { opacity: .85; }
.btn-secondary {
  font-family: var(--mono);
  font-size: 11px;
  padding: 8px 16px;
  border-radius: 4px;
  border: 1px solid var(--border2);
  background: none;
  color: var(--text2);
  cursor: pointer;
  transition: all .12s;
}
.btn-secondary:hover { border-color: var(--text2); color: var(--text); }
.close-modal {
  position: absolute;
  top: 16px;
  right: 16px;
  background: none;
  border: none;
  color: var(--text3);
  font-size: 18px;
  cursor: pointer;
  line-height: 1;
}

/* EMPTY */
.empty-state {
  padding: 40px 0;
  text-align: center;
  font-size: 12px;
  color: var(--text3);
}
.empty-state div { font-family: var(--serif); font-size: 24px; color: var(--text3); margin-bottom: 8px; }

/* MONTH GROUP HEADER */
.month-group { margin-bottom: 4px; }
.month-label {
  font-family: var(--serif);
  font-size: 13px;
  color: var(--text3);
  padding: 14px 0 6px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 6px;
  font-style: italic;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>

};

const MONTH_NUMS = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
const MONTH_FULL = {Jan:'January',Feb:'February',Mar:'March',Apr:'April',May:'May',Jun:'June',Jul:'July',Aug:'August',Sep:'September',Oct:'October',Nov:'November',Dec:'December'};

// Approximate date parsing for week-view filtering
function parseEventDate(date, m) {
  const yr = 2026;
  const mn = MONTH_NUMS[m];
  if (!mn) return null;
  const s = String(date).trim();
  if (/^\d+$/.test(s)) return new Date(yr, mn-1, parseInt(s));
  const r = s.match(/^(\w+)\s+(\d+)/);
  if (r) {
    const mm = MONTH_NUMS[r[1]];
    if (mm) return new Date(yr, mm-1, parseInt(r[2]));
    return new Date(yr, mn-1, parseInt(r[2]));
  }
  const r2 = s.match(/(\d+)/);
  if (r2) return new Date(yr, mn-1, parseInt(r2[1]));
  return new Date(yr, mn-1, 15);
}

// STATE
let view = 'all';
let filterMonth = 'All';
let filterType = 'all';
let filterClient = 'all';
let filterPriority = 'all';
let currentBriefText = '';

function setView(v, el) {
  view = v;
  document.querySelectorAll('.s-btn[data-view]').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  render();
}

function setMonth(m, el) {
  filterMonth = m;
  document.querySelectorAll('.s-btn:not([data-view])').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  render();
}

function setFilter(kind, val, el) {
  if (kind === 'type') {
    filterType = val;
    document.querySelectorAll('[data-ft]').forEach(b => b.classList.remove('on'));
    el.classList.add('on');
  } else if (kind === 'client') {
    filterClient = val;
    document.querySelectorAll('[data-fc]').forEach(b => b.classList.remove('on'));
    el.classList.add('on');
  } else if (kind === 'priority') {
    filterPriority = val;
    document.querySelectorAll('[data-fp]').forEach(b => b.classList.remove('on'));
    el.classList.add('on');
  }
  render();
}

function getDateRange() {
  const now = new Date();
  now.setHours(0,0,0,0);
  if (view === 'week') {
    const end = new Date(now);
    end.setDate(end.getDate() + 7);
    return {start: now, end};
  } else if (view === '14') {
    const end = new Date(now);
    end.setDate(end.getDate() + 14);
    return {start: now, end};
  } else if (view === '30') {
    const end = new Date(now);
    end.setDate(end.getDate() + 30);
    return {start: now, end};
  }
  return null;
}

function applyFilters(data) {
  const range = getDateRange();
  return data.filter(e => {
    if (filterMonth !== 'All' && view === 'all' && e.m !== filterMonth) return false;
    if (filterType !== 'all' && e.type !== filterType) return false;
    if (filterClient === 'augi' && !e.augi) return false;
    if (filterClient === 'twte' && !e.twte) return false;
    if (filterPriority !== 'all' && e.pr !== filterPriority) return false;
    if (range) {
      const d = parseEventDate(e.date, e.m);
      if (!d) return false;
      if (d < range.start || d > range.end) return false;
    }
    return true;
  });
}

function buildBrief(ev) {
  const clients = [ev.augi ? 'Augi' : null, ev.twte ? 'TWTE' : null].filter(Boolean).join(', ');
  const note = localStorage.getItem('note_' + ev.id) || '';
  const noteSection = note ? `\nYOUR NOTES\n${note}\n` : '';
  return `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
CONTENT BRIEF — ${ev.name.toUpperCase()}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

DATE       ${ev.date}, 2026
TYPE       ${CAT_LABELS[ev.type]}
PRIORITY   ${ev.pr}
CLIENT     ${clients || 'None assigned'}

CONTEXT
${ev.note || 'No context added yet.'}
${noteSection}
CONTENT ANGLES
— 
— 
— 

FORMATS
□ Carousel
□ Single image
□ Reel / video
□ Story
□ Caption only

DEADLINE
[ Add your deadline here ]

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
Generated by TWTE 2026 Calendar`;
}

function openBrief(id) {
  const ev = DATA.find(e => e.id === id);
  if (!ev) return;
  currentBriefText = buildBrief(ev);
  document.getElementById('modalTitle').textContent = ev.name;
  document.getElementById('modalSub').textContent = ev.date + ', 2026  ·  ' + CAT_LABELS[ev.type] + '  ·  ' + ev.pr + ' priority';
  document.getElementById('briefContent').textContent = currentBriefText;
  document.getElementById('briefModal').classList.add('open');
}

function closeModal() {
  document.getElementById('briefModal').classList.remove('open');
  const btn = document.getElementById('modalCopyBtn');
  btn.textContent = 'Copy Brief';
  btn.style.background = '';
}

function copyBrief() {
  navigator.clipboard.writeText(currentBriefText).then(() => {
    const btn = document.getElementById('modalCopyBtn');
    btn.textContent = '✓ Copied';
    btn.style.background = '#4ade80';
    setTimeout(() => {
      btn.textContent = 'Copy Brief';
      btn.style.background = '';
    }, 2000);
  });
}

function toggleExpand(id) {
  const card = document.getElementById('card_' + id);
  if (!card) return;
  card.classList.toggle('expanded');
}

function saveNote(id) {
  const ta = document.getElementById('note_' + id);
  if (!ta) return;
  localStorage.setItem('note_' + id, ta.value);
  const saved = document.getElementById('saved_' + id);
  if (saved) {
    saved.textContent = 'saved';
    saved.style.opacity = '1';
    setTimeout(() => saved.style.opacity = '0', 1500);
  }
}

function formatDateRange() {
  const range = getDateRange();
  if (!range) return '';
  const opts = {month:'short',day:'numeric'};
  return range.start.toLocaleDateString('en-US', opts) + ' — ' + range.end.toLocaleDateString('en-US', opts) + ', 2026';
}

function render() {
  const filtered = applyFilters(DATA);
  const spanning = filtered.filter(e => e.dur === 'month');
  const events = filtered.filter(e => e.dur !== 'month');
  const total = events.length + spanning.length;

  const range = getDateRange();
  const countEl = document.getElementById('resultsCount');
  if (range) {
    countEl.innerHTML = `Showing <b>${events.length} event${events.length !== 1 ? 's' : ''}</b> · <b>${formatDateRange()}</b>`;
  } else {
    countEl.innerHTML = `<b>${events.length}</b> event${events.length !== 1 ? 's' : ''}${spanning.length ? ' + <b>' + spanning.length + '</b> month-long' : ''}`;
  }

  // Sidebar month buttons only active for full year view
  document.querySelector('.sidebar').style.opacity = view !== 'all' ? '0.5' : '1';
  document.querySelector('.sidebar').style.pointerEvents = view !== 'all' ? 'none' : '';
  document.querySelectorAll('.s-btn[data-view]').forEach(b => {
    b.style.opacity = ''; b.style.pointerEvents = '';
  });
  if (view !== 'all') {
    document.querySelector('.sidebar').style.opacity = '';
    document.querySelector('.sidebar').style.pointerEvents = '';
    const monthBtns = document.querySelectorAll('.s-btn:not([data-view])');
    monthBtns.forEach(b => { b.style.opacity = '0.35'; b.style.pointerEvents = 'none'; });
  } else {
    const monthBtns = document.querySelectorAll('.s-btn:not([data-view])');
    monthBtns.forEach(b => { b.style.opacity = ''; b.style.pointerEvents = ''; });
  }

  let html = '';

  // Spanning
  if (spanning.length) {
    html += `<div class="span-block"><div class="span-title">MONTH-LONG OBSERVANCES</div><div class="span-pills">`;
    spanning.forEach(s => {
      html += `<span class="sp" style="${SP_STYLE[s.type]}">${s.name}</span>`;
    });
    html += `</div></div>`;
  }

  if (!events.length) {
    html += `<div class="empty-state"><div>—</div>No events match these filters.</div>`;
    document.getElementById('content').innerHTML = html;
    return;
  }

  // Group by month if showing all
  if (view === 'all' && filterMonth === 'All') {
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    months.forEach(m => {
      const mevents = events.filter(e => e.m === m);
      if (!mevents.length) return;
      html += `<div class="month-group">`;
      html += `<div class="month-label">${MONTH_FULL[m]}</div>`;
      html += `<div class="ev-list">`;
      mevents.forEach(e => { html += renderCard(e); });
      html += `</div></div>`;
    });
  } else {
    html += `<div class="ev-list">`;
    events.forEach(e => { html += renderCard(e); });
    html += `</div>`;
  }

  document.getElementById('content').innerHTML = html;

  // Restore notes
  DATA.forEach(e => {
    const ta = document.getElementById('note_' + e.id);
    if (ta) {
      const saved = localStorage.getItem('note_' + e.id);
      if (saved) ta.value = saved;
      ta.addEventListener('input', () => saveNote(e.id));
    }
  });
}

function renderCard(e) {
  const clients = [e.augi ? '<span class="tag tag-augi">AUGI</span>' : '', e.twte ? '<span class="tag tag-twte">TWTE</span>' : ''].join('');
  const note = localStorage.getItem('note_' + e.id) || '';
  return `<div class="ev-card" id="card_${e.id}">
    <div class="ev-main" onclick="toggleExpand('${e.id}')">
      <div class="pr-dot ${PR_CLS[e.pr]}"></div>
      <span class="ev-date">${e.date}</span>
      <div class="ev-body">
        <div class="ev-name">${e.name}</div>
        ${e.note ? `<div class="ev-note">${e.note}</div>` : ''}
        <div class="ev-tags"><span class="tag ${CAT_CLS[e.type]}">${CAT_LABELS[e.type].toUpperCase()}</span>${clients}</div>
      </div>
      <div class="ev-actions">
        <button class="copy-btn" onclick="event.stopPropagation();openBrief('${e.id}')">BRIEF ↗</button>
        <span class="expand-icon">▾</span>
      </div>
    </div>
    <div class="ev-expand">
      <div class="notes-label">YOUR NOTES</div>
      <textarea class="notes-area" id="note_${e.id}" placeholder="Add content ideas, angles, or reminders for this date...">${note}</textarea>
      <div class="notes-saved" id="saved_${e.id}" style="opacity:0">saved</div>
    </div>
  </div>`;
}

// Close modal on overlay click
document.getElementById('briefModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

render();
</script>
